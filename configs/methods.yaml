# Canonical pruning configs per method on POPE / LLaVA-1.5 7B.
# Values from each method's paper / reference repo default.
model_base: liuhaotian/llava-v1.5-7b

# common_args is intentionally empty:
#   - `dtype` is rejected by lmms-eval v0.5 Llava.__init__ (asserts kwargs == {});
#     the class hardcodes fp16 internally.
#   - `attn_implementation` cannot be shared: FastV requires "eager" (attention
#     map needed at agg layer), SparseVLMs asserts "sdpa". Set per run.
common_args: {}

runs:
  - name: baseline
    model: llava_baseline
    model_args: {}

  - name: fastv_K2_R128
    model: llava_fastv
    model_args:
      fast_v_agg_layer: 2
      fast_v_attention_rank: 128
      attn_implementation: eager   # FastV reads attention weights at layer K

  - name: sparsevlm_192
    model: llava_sparsevlm
    model_args:
      retain_token: 192
      attn_implementation: sdpa    # SparseVLMs asserts sdpa at modelling_sparse_llama.py:727

  - name: visionzip_64
    model: llava_visionzip
    model_args:
      dominant: 54
      contextual: 10

  - name: divprune_0.098
    model: llava_divprune
    model_args:
      subset_ratio: 0.098

  - name: sparsevila_0.5_0.5
    model: llava_sparsevila
    model_args:
      encoder_prune_ratio: 0.5
      decode_retrieval_ratio: 0.5
