# Canonical pruning configs per method on POPE / LLaVA-1.5 7B.
# Values from each method's paper / reference repo default.
#
# Fairness contract (see docs/COLAB_FIXES.md):
#   - All non-FastV methods run with attn_implementation=sdpa (explicit), so
#     baseline/visionzip/divprune don't drift from sparsevlm's hard sdpa
#     requirement.
#   - dtype is fp16 across the board — hardcoded by lmms-eval Llava and by
#     SparseVILA's loader; not exposed as a knob.
#   - batch_size is per-method (see notes below). Use FLOPs (computed via
#     vtp_eval.utils.tflops) for the fair compute comparison; wall-clock
#     latency from timing.json is per-sample but still depends on batch.
model_base: liuhaotian/llava-v1.5-7b

common_args:
  # SDPA is the right default everywhere except FastV (which needs `eager`
  # because it reads attention maps at the aggregation layer). For all 5
  # methods that currently run on Python 3.12, sdpa is correct.
  attn_implementation: sdpa

runs:
  - name: baseline
    model: llava_baseline
    model_args: {}

  # FastV is BLOCKED on Colab Python 3.12 — keep the entry for documentation
  # but the notebook generator excludes it from the default RUNS list.
  # See docs/COLAB_FIXES.md root cause #18. FastV needs eager attention, which
  # overrides common_args here.
  - name: fastv_K2_R128
    model: llava_fastv
    model_args:
      fast_v_agg_layer: 2
      fast_v_attention_rank: 128
      attn_implementation: eager   # FastV reads attention weights at layer K

  - name: sparsevlm_192
    model: llava_sparsevlm
    # SparseVLMs' custom SDPA path at utils.py:109 does `attn_bias += attn_mask`
    # with mismatched ranks ([seq,seq] += [B,1,seq,seq]); fails for B>1.
    # Override the default VTP_BATCH_SIZE for this run only.
    batch_size: 1
    model_args:
      retain_token: 192

  - name: visionzip_64
    model: llava_visionzip
    model_args:
      dominant: 54
      contextual: 10

  - name: divprune_0.098
    model: llava_divprune
    # DivPrune's pruning code in llava_arch.py:373 reads
    # `visual_tokens = new_input_embeds[0][...]` — hardcoded [0] computes
    # the diverse-subset indices from sample 0's image only and then applies
    # the same keep_indexs to every sample in the batch. With B>1 this gives
    # the second (and later) samples a token subset optimized for someone
    # else's image, costing ~5pp F1 on POPE. The paper's run_Divprune.sh
    # uses --batch_size 1, sidestepping the bug; we do the same.
    batch_size: 1
    model_args:
      subset_ratio: 0.098

  - name: sparsevila_0.5_0.5
    model: llava_sparsevila
    # sparse_generate_packed at sparse_generate.py:332 raises NotImplementedError
    # for batch_size != 1, so this method is structurally batch=1. The adapter
    # also bypasses lmms-eval's batching (does its own `for r in requests` loop).
    batch_size: 1
    model_args:
      encoder_prune_ratio: 0.5
      decode_retrieval_ratio: 0.5
